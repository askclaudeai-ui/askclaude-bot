name: Ask Claude Bot

on:
  schedule:
    - cron: '0 9 * * 1,3,4'
    - cron: '0 18 * * 1,3,4'
    - cron: '30 22 * * 1,3,4'
    - cron: '0 10 * * *'
    - cron: '0 8 * * 0'
    - cron: '0 */14 * * *'
  workflow_dispatch:
  repository_dispatch:

env:
  ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
  INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
  INSTAGRAM_USER_ID:        ${{ secrets.INSTAGRAM_USER_ID }}
  IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
  ELEVENLABS_API_KEY:       ${{ secrets.ELEVENLABS_API_KEY }}
  ELEVENLABS_VOICE_ID:      ${{ secrets.ELEVENLABS_VOICE_ID }}
  CLOUDINARY_CLOUD_NAME:    ${{ secrets.CLOUDINARY_CLOUD_NAME }}
  CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
  CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}
  GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
  NOTIFY_EMAIL:             ${{ secrets.NOTIFY_EMAIL }}
  GITHUB_TOKEN_PAT:         ${{ secrets.GITHUB_TOKEN_PAT }}
  GITHUB_REPO:              ${{ secrets.GITHUB_REPO }}
  DASHBOARD_URL:            ${{ secrets.DASHBOARD_URL }}
  LATE_API_KEY:             ${{ secrets.LATE_API_KEY }}
  LATE_ACCOUNT_ID:          ${{ secrets.LATE_ACCOUNT_ID }}

jobs:

  # ── Job 1: Generate feed content (9am Mon/Wed/Thu) ─────────────────
  generate_feed:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 9 * * 1,3,4' ||
        contains(github.event.schedule, '0 9')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pillow moviepy==1.0.3 requests flask
          pip install scikit-learn xgboost pandas numpy
          pip install elevenlabs python-dotenv

      - name: Pull latest
        run: git pull

      - name: Research trends
        run: python scripts/research_trends.py

      - name: Generate content
        run: |
          DAY=$(date +%A | tr '[:upper:]' '[:lower:]')
          case $DAY in
            monday)    python scripts/generate_content.py static ;;
            wednesday) python scripts/generate_carousel.py ;;
            thursday)  python scripts/generate_reel.py ;;
            *)         python scripts/generate_content.py static ;;
          esac

      - name: Generate image (static posts only)
        run: |
          DAY=$(date +%A | tr '[:upper:]' '[:lower:]')
          if [ "$DAY" = "monday" ]; then
            python scripts/generate_image.py
          fi

      - name: Commit generated content
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add queue/ data/
          git diff --staged --quiet || git commit -m "Generated content $(date +%Y-%m-%d)"
          git push

  # ── Job 2: Publish feed post (6pm Mon/Wed/Thu) ─────────────────────
  publish_feed:
    if: >
      github.event_name == 'schedule' &&
      (github.event.schedule == '0 18 * * 1,3,4' ||
       contains(github.event.schedule, '0 18'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pillow moviepy==1.0.3 requests flask
          pip install scikit-learn xgboost pandas numpy
          pip install elevenlabs python-dotenv

      - name: Pull latest
        run: git pull

      - name: Publish approved post
        run: python scripts/publish_post.py

      - name: Commit published status
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add queue/
          git diff --staged --quiet || git commit -m "Published post $(date +%Y-%m-%d)"
          git push

  # ── Job 3: Generate story (10:30pm Mon/Wed/Thu) ─────────────────────
  generate_story:
    if: >
      github.event_name == 'schedule' &&
      (github.event.schedule == '30 22 * * 1,3,4' ||
       contains(github.event.schedule, '30 22'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pillow requests python-dotenv

      - name: Pull latest
        run: git pull

      - name: Generate story
        run: |
          DAY=$(date +%A | tr '[:upper:]' '[:lower:]')
          case $DAY in
            monday)    python scripts/generate_story.py tip_repurpose ;;
            tuesday)   python scripts/generate_story.py poll ;;
            wednesday) python scripts/generate_story.py behind_scenes ;;
            thursday)  python scripts/generate_story.py reel_teaser ;;
            friday)    python scripts/generate_story.py quiz ;;
            sunday)    python scripts/generate_story.py weekly_roundup ;;
            *)         python scripts/generate_story.py tip_repurpose ;;
          esac

      - name: Commit story
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add queue/stories/ data/
          git diff --staged --quiet || git commit -m "Generated story $(date +%Y-%m-%d)"
          git push

  # ── Job 4: Fetch story insights (10am daily) ────────────────────────
  fetch_story_insights:
    if: >
      github.event_name == 'schedule' &&
      (github.event.schedule == '0 10 * * *' ||
       contains(github.event.schedule, '0 10'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Pull latest
        run: git pull

      - name: Fetch story insights
        run: python scripts/fetch_story_insights.py

      - name: Commit insights
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add data/
          git diff --staged --quiet || git commit -m "Story insights $(date +%Y-%m-%d)"
          git push

  # ── Job 5: Weekly optimise (Sunday 8am) ─────────────────────────────
  weekly_optimise:
    if: >
      github.event_name == 'schedule' &&
      (github.event.schedule == '0 8 * * 0' ||
       contains(github.event.schedule, '0 8'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic requests python-dotenv
          pip install scikit-learn xgboost pandas numpy

      - name: Pull latest
        run: git pull

      - name: Fetch Anthropic news
        run: python scripts/fetch_anthropic_news.py

      - name: Fetch feed insights
        run: python scripts/fetch_insights.py

      - name: Fetch story insights
        run: python scripts/fetch_story_insights.py

      - name: Analyse performance
        run: python scripts/analyse_performance.py

      - name: Optimise strategy
        run: python scripts/optimize_strategy.py

      - name: Commit updated strategy and reports
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly optimisation $(date +%Y-%m-%d)"
          git push

  # ── Job 6: Publish on approval (triggered by dashboard) ─────────────
  publish_on_approval:
    if: github.event.action == 'publish_approved_post'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pillow moviepy==1.0.3 requests flask
          pip install scikit-learn xgboost pandas numpy
          pip install elevenlabs python-dotenv

      - name: Wait for approval to propagate
        run: sleep 30

      - name: Pull latest
        run: git pull

      - name: Publish approved post
        run: python scripts/publish_post.py

      - name: Send publish confirmation email
        run: |
          python3 -c "
import json, os, sys, glob
sys.path.insert(0, 'scripts')
from notify import notify_post_published
posts = []
for f in glob.glob('queue/*.json'):
    try:
        d = json.load(open(f))
        if d.get('status') == 'published':
            posts.append(d)
    except: pass
if posts:
    posts.sort(key=lambda x: x.get('published_at',''), reverse=True)
    p = posts[0]
    notify_post_published(p, p.get('instagram_media_id',''))
"

      - name: Commit published status
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add queue/
          git diff --staged --quiet || git commit -m "Published post $(date +%Y-%m-%d)"
          git push

  # ── Job 7: Regenerate rejected content ──────────────────────────────
  regenerate_content:
    if: github.event.action == 'regenerate_content'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pillow moviepy==1.0.3 requests flask
          pip install scikit-learn xgboost pandas numpy
          pip install elevenlabs python-dotenv

      - name: Pull latest
        run: git pull

      - name: Regenerate content
        run: |
          CONTENT_TYPE="${{ github.event.client_payload.content_type }}"
          STORY_TYPE="${{ github.event.client_payload.story_type }}"
          POST_ID="${{ github.event.client_payload.post_id }}"
          FEEDBACK="${{ github.event.client_payload.feedback }}"

          if [ -n "$POST_ID" ] && [ -n "$FEEDBACK" ]; then
            python scripts/regenerate_post.py "$POST_ID" "$FEEDBACK"
          else
            case $CONTENT_TYPE in
              static)   python scripts/generate_content.py static && python scripts/generate_image.py ;;
              carousel) python scripts/generate_carousel.py ;;
              reel)     python scripts/generate_reel.py ;;
              story)    python scripts/generate_story.py $STORY_TYPE ;;
              *)        python scripts/generate_content.py static && python scripts/generate_image.py ;;
            esac
          fi

      - name: Commit regenerated content
        run: |
          git config user.name  "Ask Claude Bot"
          git config user.email "askclaudeai@gmail.com"
          git add queue/ data/
          git diff --staged --quiet || git commit -m "Regenerated content $(date +%Y-%m-%d)"
          git push

  # ── Job 8: Keep Render dashboard awake ──────────────────────────────
  # ── Job 8: Keep Render dashboard awake + catch-all ──────────────────
  keep_alive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboard
        run: curl -s ${{ secrets.DASHBOARD_URL }} > /dev/null && echo "Dashboard awake"